<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Senhas Seguras</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0f172a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 500px;
    background: #1e293b;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 0 30px rgba(0,0,0,.3);
}

h1 {
    text-align: center;
    margin-bottom: 25px;
}

.password-box {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.password-box input {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #334155;
    color: #fff;
    font-size: 16px;
}

.password-box button {
    background: #22c55e;
    color: white;
    border: none;
    padding: 0 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.password-box button:hover {
    background: #16a34a;
}

.option {
    margin-bottom: 15px;
}

.option label {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

input[type="range"] {
    width: 100%;
    margin-top: 10px;
}

.check-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 20px 0;
}

.check-group label {
    display: flex;
    gap: 10px;
    align-items: center;
}

.generate-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
}

.generate-btn:hover {
    background: #2563eb;
}

.strength {
    margin-top: 20px;
}

.bar {
    height: 10px;
    border-radius: 999px;
    background: #334155;
    overflow: hidden;
    margin-top: 8px;
}

.bar-fill {
    height: 100%;
    width: 0%;
    transition: .3s;
}

.weak {
    width: 33%;
    background: #ef4444;
}

.medium {
    width: 66%;
    background: #f59e0b;
}

.strong {
    width: 100%;
    background: #22c55e;
}

.info {
    margin-top: 20px;
    font-size: 14px;
    color: #cbd5e1;
}
</style>
</head>
<body>

<div class="container">

    <h1>🔐 Gerador de Senhas</h1>

    <div class="password-box">
        <input id="password" type="text" readonly>
        <button id="copyBtn">Copiar</button>
    </div>

    <div class="option">
        <label>
            Comprimento:
            <span id="lengthValue">16</span>
        </label>

        <input
            type="range"
            id="length"
            min="8"
            max="64"
            value="16">
    </div>

    <div class="check-group">
        <label>
            <input type="checkbox" id="lowercase" checked>
            Letras minúsculas
        </label>

        <label>
            <input type="checkbox" id="uppercase" checked>
            Letras maiúsculas
        </label>

        <label>
            <input type="checkbox" id="numbers" checked>
            Números
        </label>

        <label>
            <input type="checkbox" id="symbols" checked>
            Símbolos
        </label>
    </div>

    <button class="generate-btn" id="generateBtn">
        Gerar Senha Segura
    </button>

    <div class="strength">
        <div>Força da senha: <span id="strengthText">Forte</span></div>
        <div class="bar">
            <div id="strengthBar" class="bar-fill strong"></div>
        </div>
    </div>

    <div class="info">
        Recomendação: utilize pelo menos 16 caracteres com letras, números e símbolos.
    </div>

</div>

<script>
const passwordInput = document.getElementById("password");
const generateBtn = document.getElementById("generateBtn");
const copyBtn = document.getElementById("copyBtn");
const lengthSlider = document.getElementById("length");
const lengthValue = document.getElementById("lengthValue");

lengthSlider.addEventListener("input", () => {
    lengthValue.textContent = lengthSlider.value;
});

const sets = {
    lowercase: "abcdefghijklmnopqrstuvwxyz",
    uppercase: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
    numbers: "0123456789",
    symbols: "!@#$%^&*()-_=+[]{};:,.<>/?"
};

function secureRandom(max) {
    const array = new Uint32Array(1);
    crypto.getRandomValues(array);
    return array[0] % max;
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = secureRandom(i + 1);
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function generatePassword() {

    const length = parseInt(lengthSlider.value);

    const enabledSets = [];

    if (lowercase.checked) enabledSets.push(sets.lowercase);
    if (uppercase.checked) enabledSets.push(sets.uppercase);
    if (numbers.checked) enabledSets.push(sets.numbers);
    if (symbols.checked) enabledSets.push(sets.symbols);

    if (enabledSets.length === 0) {
        alert("Selecione pelo menos uma opção.");
        return;
    }

    let password = [];

    enabledSets.forEach(set => {
        password.push(set[secureRandom(set.length)]);
    });

    const allChars = enabledSets.join("");

    while (password.length < length) {
        password.push(allChars[secureRandom(allChars.length)]);
    }

    password = shuffle(password).join("");

    passwordInput.value = password;

    updateStrength(password);
}

function updateStrength(password) {

    let score = 0;

    if (password.length >= 12) score++;
    if (password.length >= 16) score++;

    if (/[a-z]/.test(password)) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/\d/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;

    const bar = document.getElementById("strengthBar");
    const text = document.getElementById("strengthText");

    bar.className = "bar-fill";

    if (score <= 3) {
        bar.classList.add("weak");
        text.textContent = "Fraca";
    } else if (score <= 5) {
        bar.classList.add("medium");
        text.textContent = "Média";
    } else {
        bar.classList.add("strong");
        text.textContent = "Forte";
    }
}

copyBtn.addEventListener("click", async () => {

    if (!passwordInput.value) return;

    await navigator.clipboard.writeText(passwordInput.value);

    copyBtn.textContent = "Copiado!";

    setTimeout(() => {
        copyBtn.textContent = "Copiar";
    }, 2000);
});

generateBtn.addEventListener("click", generatePassword);

generatePassword();
</script>

</body>
</html>
